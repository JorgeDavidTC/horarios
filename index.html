<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMSS Horarios - Sistema por Carreras Independientes</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #eef2f5;
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        .dashboard {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
            align-items: start;
        }
        .sidebar {
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            overflow: hidden;
            position: sticky;
            top: 20px;
        }
        .sidebar-header {
            background: #0b3b5f;
            color: white;
            padding: 1.2rem 1.5rem;
        }
        .sidebar-header h2 { font-size: 1.4rem; }
        .sidebar-header p { font-size: 0.75rem; opacity: 0.8; margin-top: 6px; }
        
        .nav-container {
            max-height: 55vh;
            overflow-y: auto;
        }
        .facultad-item, .carrera-item, .nav-item {
            padding: 12px 20px;
            cursor: pointer;
            border-left: 4px solid transparent;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .facultad-item:hover, .carrera-item:hover, .nav-item:hover { background: #f1f9ff; }
        .facultad-item.active, .carrera-item.active, .nav-item.active {
            background: #e3f0fa;
            border-left-color: #2c7da0;
            font-weight: 600;
        }
        .nav-title {
            padding: 12px 20px 4px;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 700;
            color: #5f7f9e;
        }
        .back-button {
            background: transparent;
            border: none;
            color: #2c7da0;
            cursor: pointer;
            padding: 8px 16px;
            margin: 4px 8px;
            border-radius: 40px;
            font-size: 0.85rem;
        }
        .back-button:hover { background: #e6f4ff; }
        
        .schedule-panel {
            background: white;
            border-radius: 28px;
            padding: 1.5rem;
            overflow-x: auto;
        }
        .schedule-header {
            margin-bottom: 20px;
            border-bottom: 2px solid #eef2f5;
            padding-bottom: 12px;
        }
        .schedule-header h3 { font-size: 1.4rem; color: #0b3b5f; }
        .schedule-header p { color: #4a627a; font-size: 0.85rem; margin-top: 6px; }
        
        .horario-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
            min-width: 700px;
        }
        .horario-table th, .horario-table td {
            border: 1px solid #dde4ec;
            padding: 8px 4px;
            text-align: center;
            vertical-align: middle;
        }
        .horario-table th { background: #f0f4f9; font-weight: 600; padding: 10px 4px; }
        .clase-cell {
            background: #eef6fc;
            border-radius: 8px;
            padding: 6px 4px;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .badge-aula {
            font-size: 0.65rem;
            color: #2c7da0;
            display: block;
            margin-top: 4px;
        }
        .empty-message { text-align: center; padding: 50px; color: #7f8c8d; }
        .loading { text-align: center; padding: 30px; color: #2c7da0; }
        footer { margin-top: 30px; text-align: center; font-size: 0.7rem; color: #5c6f87; }
        
        @media (max-width: 900px) { .dashboard { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>📚 UMSS · Facultades</h2>
            <p>Cada carrera tiene su propio archivo</p>
        </div>
        <div id="nav-container" class="nav-container">
            <div class="loading">Cargando facultades...</div>
        </div>
        <div id="breadcrumb-buttons" style="padding: 12px; border-top: 1px solid #e9ecef;"></div>
    </div>
    <div class="schedule-panel">
        <div class="schedule-header">
            <h3 id="schedule-title">📅 Horario Semanal</h3>
            <p id="schedule-subtitle">Selecciona facultad → carrera → nivel → materia → docente</p>
        </div>
        <div id="horario-wrapper"><div class="empty-message">⬅️ Elige una facultad para comenzar</div></div>
        <footer>📁 Las carreras están en carpetas independientes: /facultades/[facultad]/[carrera]/carrera.js</footer>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
