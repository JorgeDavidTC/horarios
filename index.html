<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Gestión de Horarios Universitarios</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app-container">
    <div class="nav-panel">
        <div id="nav-container">Cargando...</div>
    </div>
    <div class="schedule-panel">
        <div class="breadcrumb-buttons" id="breadcrumb-buttons"></div>
        <div class="selections-area" id="selections-area">
            <div class="selections-title">
                📌 Materias/Docentes Seleccionados
                <button class="clear-all-btn" id="clear-all-selections">🗑️ Limpiar todo</button>
            </div>
            <div id="selections-list" class="selections-list">Ninguna materia seleccionada aún.</div>
        </div>
        <h3 id="schedule-title">📅 Horario Combinado</h3>
        <p id="schedule-subtitle" style="color: #555;">Visualiza todas tus materias seleccionadas</p>
        <div id="horario-wrapper" class="horario-wrapper"></div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
