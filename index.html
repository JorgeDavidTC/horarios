<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Horario Universitario - Gestión de Clases</title>
    
    <!-- Favicon con diseño de libro -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2300695c'/%3E%3Ctext x='50' y='68' font-size='45' text-anchor='middle' fill='white'%3E📚%3C/text%3E%3C/svg%3E">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Botón flotante FAB para abrir/cerrar el panel de navegación en móvil -->
<button class="menu-fab" id="menuFabBtn" aria-label="Abrir menú de navegación">
    <span class="menu-icon">☰</span>
</button>

<!-- Overlay para cerrar el menú al tocar fuera -->
<div class="menu-overlay" id="menuOverlay"></div>

<div class="app-container">
    <!-- Panel izquierdo de navegación -->
    <div class="nav-panel" id="navPanel">
        <div class="nav-header">
            <div class="nav-header-logo">
                <span class="nav-logo-icon">📚</span>
                <h2 class="nav-title">Navegación</h2>
            </div>
            <button class="close-nav-btn" id="closeNavBtn" aria-label="Cerrar menú">✕</button>
        </div>
        <div id="nav-container">Cargando...</div>
    </div>

    <div class="schedule-panel">
        <!-- Migas de pan / botones de navegación -->
        <div class="breadcrumb-buttons" id="breadcrumb-buttons"></div>
        
        <!-- Área de selecciones -->
        <div class="selections-area" id="selections-area">
            <div class="selections-title">
                <span>📌 Seleccionados</span>
                <button class="clear-all-btn" id="clear-all-selections">🗑️ Limpiar todo</button>
            </div>
            <div id="selections-list" class="selections-list">Ninguna materia seleccionada aún.</div>
        </div>
        
        <!-- Título del horario -->
        <div class="schedule-header">
            <div class="schedule-title-wrapper">
                <span class="schedule-icon">📅</span>
                <h3 id="schedule-title">Horario Combinado</h3>
            </div>
            <span id="schedule-count" class="schedule-count">0 materias</span>
        </div>
        
        <!-- Contenedor del horario con scroll horizontal mejorado -->
        <div class="horario-container">
            <div id="horario-wrapper" class="horario-wrapper"></div>
        </div>
        
        <!-- Leyenda de colores -->
        <div class="legend">
            <div class="legend-item">
                <div class="legend-color legend-normal"></div>
                <span>Clase asignada</span>
            </div>
            <div class="legend-item">
                <div class="legend-color legend-conflict"></div>
                <span>Conflicto de horario</span>
            </div>
            <div class="legend-item">
                <div class="legend-icon">💡</div>
                <span>Selecciona desde el menú</span>
            </div>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
